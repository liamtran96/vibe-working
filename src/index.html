<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Working</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <button id="sidebarToggle" class="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M6 3v10" stroke="currentColor" stroke-width="1.4"/>
      </svg>
    </button>
    <aside class="sidebar">
      <div class="sidebar-brand">Workspace</div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="repos">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 3.5A1.5 1.5 0 0 1 3.5 2h3.879a1.5 1.5 0 0 1 1.06.44l1.122 1.12A1.5 1.5 0 0 0 10.62 4H12.5A1.5 1.5 0 0 1 14 5.5v7A1.5 1.5 0 0 1 12.5 14h-9A1.5 1.5 0 0 1 2 12.5v-9Z" stroke="currentColor" stroke-width="1.4"/>
            </svg>
          </span>
          <span>Repos</span>
        </button>
        <button class="nav-item" data-view="notes">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3.5 2h6.379a1.5 1.5 0 0 1 1.06.44l2.121 2.12A1.5 1.5 0 0 1 13.5 5.62V13.5A1.5 1.5 0 0 1 12 15H4a1.5 1.5 0 0 1-1.5-1.5v-10A1.5 1.5 0 0 1 4 2Z" stroke="currentColor" stroke-width="1.4"/>
              <path d="M5.5 8h5M5.5 11h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </span>
          <span>Notes</span>
        </button>
      </nav>
    </aside>

    <main class="view-host">
      <!-- ===================== REPOS VIEW ===================== -->
      <section id="view-repos" class="view">
        <div class="container">
          <div class="sticky-top">
            <header>
              <h1>Vibe Working</h1>
              <div class="actions">
                <button id="addRepo" class="btn btn-primary">Add repository</button>
              </div>
            </header>

            <div class="toolbar">
              <div class="search-bar">
                <span class="search-icon">
                  <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                </span>
                <input type="text" id="searchInput" placeholder="Search repositories" autocomplete="off" />
              </div>
              <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="running">Running</button>
                <button class="filter-btn" data-filter="stopped">Stopped</button>
              </div>
            </div>
          </div>

          <div class="view-body">
            <div id="repoList" class="repo-list">
              <!-- Repos will be rendered here -->
            </div>
            <div id="emptyState" class="empty-state">
              <p>Nothing here yet</p>
              <p>Add a repository to get started.</p>
            </div>
          </div>
        </div>
      </section>

      <!-- ===================== NOTES VIEW ===================== -->
      <section id="view-notes" class="view notes-view hidden">
        <div class="notes-list-col">
          <div class="notes-list-header">
            <button id="newNoteBtn" class="btn btn-primary btn-sm">+ New</button>
            <div class="search-bar">
              <span class="search-icon">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </span>
              <input type="text" id="noteSearchInput" placeholder="Search" autocomplete="off" />
            </div>
          </div>
          <div id="noteTagFilters" class="tag-filter-row"></div>
          <div id="noteList" class="note-list" tabindex="0"></div>
          <div id="noteEmptyState" class="notes-list-empty hidden">
            <p>No notes</p>
            <p class="hint">Press <kbd>Cmd</kbd>+<kbd>N</kbd> to create one.</p>
          </div>
          <button id="openNotesFolderBtn" class="notes-folder-footer" title="Open notes folder in Explorer">
            <span class="folder-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 4.5A1.5 1.5 0 0 1 3.5 3h2.879a1.5 1.5 0 0 1 1.06.44l1.122 1.12A1.5 1.5 0 0 0 9.62 5H12.5A1.5 1.5 0 0 1 14 6.5v5A1.5 1.5 0 0 1 12.5 13h-9A1.5 1.5 0 0 1 2 11.5v-7Z" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            </span>
            <span id="notesFolderPath" class="folder-path">…</span>
          </button>
        </div>

        <div id="notesEditorCol" class="notes-editor-col">
          <div class="editor-topbar">
            <button id="listToggleBtn" class="icon-btn" title="Hide notes list (Ctrl+\)" aria-label="Toggle notes list">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M9 3v18"/>
              </svg>
            </button>
            <div class="editor-topbar-status">
              <span id="saveStatus" class="status-saved">Saved</span>
              <span class="dot">·</span>
              <span id="wordCount">0 words</span>
              <span class="dot">·</span>
              <span id="readingTime">0 min read</span>
              <span class="dot">·</span>
              <span id="noteUpdatedAt"></span>
            </div>
          </div>
          <div id="editorEmpty" class="editor-empty">
            <div>
              <p>Select a note</p>
              <p class="hint">or create a new one with <kbd>Cmd</kbd>+<kbd>N</kbd></p>
            </div>
          </div>
          <div id="editorPane" class="editor-pane hidden">
            <header class="editor-head">
              <input type="text" id="noteTitle" class="note-title-input" placeholder="Untitled" />
              <input type="text" id="noteTags" class="note-tags-input" placeholder="Tags…" />
              <div class="editor-actions-inline">
                  <button id="pinBtn" class="icon-btn" title="Pin note" aria-pressed="false">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M12 17v5"/>
                      <path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V5a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/>
                    </svg>
                  </button>
                  <button id="previewToggle" class="icon-btn" title="Toggle preview (Ctrl+/)">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="3" y="3" width="18" height="18" rx="2"/>
                      <path d="M12 3v18"/>
                    </svg>
                  </button>
                  <button id="noteDeleteBtn" class="icon-btn" title="Delete note">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M3 6h18"/>
                      <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                      <path d="M10 11v6"/>
                      <path d="M14 11v6"/>
                    </svg>
                  </button>
              </div>
            </header>
            <div id="editorSplit" class="editor-split">
              <textarea id="noteBody" class="note-body" placeholder="Start writing… (type / for blocks, [[ to link)" spellcheck="false"></textarea>
              <div id="notePreview" class="note-preview"></div>
            </div>
            <div id="backlinksPane" class="backlinks-pane hidden" aria-label="Linked references">
              <div class="backlinks-head">
                <span class="backlinks-title">Linked references</span>
                <span id="backlinksCount" class="backlinks-count">0</span>
                <button id="backlinksToggle" class="icon-btn icon-btn-sm" title="Collapse" aria-expanded="true">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 9l6 6 6-6"/>
                  </svg>
                </button>
              </div>
              <div id="backlinksList" class="backlinks-list"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Command palette overlay -->
  <div id="cmdPalette" class="cmd-palette hidden" aria-hidden="true">
    <div class="cmd-palette-backdrop"></div>
    <div class="cmd-palette-box" role="dialog" aria-label="Command palette">
      <input id="cmdInput" type="text" placeholder="Jump to a note or run a command…" autocomplete="off" />
      <div id="cmdResults" class="cmd-results"></div>
    </div>
  </div>

  <!-- Slash menu (anchored near caret) -->
  <div id="slashMenu" class="slash-menu hidden" role="menu"></div>

  <!-- Wiki-link autocomplete (anchored near caret) -->
  <div id="wikiMenu" class="slash-menu wiki-menu hidden" role="menu"></div>

  <!-- Hidden mirror for textarea caret position -->
  <div id="caretMirror" class="caret-mirror" aria-hidden="true"></div>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
