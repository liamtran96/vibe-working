<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo Launcher</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="sticky-top">
      <header>
        <h1>Repo Launcher</h1>
        <div class="actions">
          <button id="addRepo" class="btn btn-primary">Add repository</button>
        </div>
      </header>

      <div class="toolbar">
        <div class="search-bar">
          <span class="search-icon">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          <input type="text" id="searchInput" placeholder="Search repositories" autocomplete="off" />
        </div>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="running">Running</button>
          <button class="filter-btn" data-filter="stopped">Stopped</button>
        </div>
      </div>
    </div>

    <main>
      <div id="repoList" class="repo-list">
        <!-- Repos will be rendered here -->
      </div>
      <div id="emptyState" class="empty-state">
        <p>Nothing here yet</p>
        <p>Add a repository to get started.</p>
      </div>
    </main>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
